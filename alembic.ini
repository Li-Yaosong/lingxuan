# Alembic configuration for lingxuan.
#
# The actual DB URL is resolved at runtime by alembic/env.py via
# ConfigProvider / environment variable.  The placeholder below is only
# used by `alembic` CLI when no env override is available.

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///data/lingxuan.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
